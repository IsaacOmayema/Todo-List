<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
</head>
<body>
  <div id="app">
    <section id="auth-section">
      <div class="auth-card">
        <h1>Todo List</h1>
        <form id="auth-form">
          <div class="form-group">
            <label for="auth-email">Email</label>
            <input type="email" id="auth-email" required>
          </div>
          <div class="form-group">
            <label for="auth-password">Password</label>
            <input type="password" id="auth-password" required>
          </div>
          <button type="submit" class="btn btn-primary" id="auth-submit">Sign In</button>
          <div id="auth-error" class="error-message"></div>
        </form>
        <div class="auth-toggle" id="auth-toggle">Don't have an account? Sign Up</div>
      </div>
    </section>

    <section id="app-section">
      <div class="header">
        <div class="user-info">
          <span id="user-email"></span>
        </div>
        <button class="btn-secondary" id="sign-out-btn">Sign Out</button>
      </div>

      <div class="todo-input-section">
        <input type="text" id="todo-input" placeholder="Enter your task here...">
        <button id="add-button">Add</button>
      </div>

      <div class="todo-display-section">
        <div id="todo-display"></div>
      </div>
    </section>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
